<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Unfinished Idea</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav id="nav">
  <div id="nav-title" onclick="closeAllModals()">Unfinished<br>Idea</div>
  <div id="nav-links">
    <button class="nav-btn" onclick="openSharing()">sharing idea</button>
    <button class="nav-btn" onclick="openMyBox()">my box</button>
  </div>
</nav>

<div id="landing">
  <div id="blocks-layer"></div>
  <canvas id="physics-canvas"></canvas>
</div>

<!-- MY BOX — full-screen background layer -->
<div id="mybox-page">
  <div id="mybox-items"></div>
</div>

<div id="tooltip">
  <div id="tt-name"></div>
  <div id="tt-meta"></div>
</div>

<!-- DETAIL PANEL -->
<div id="detail-panel">
  <button id="detail-close" onclick="closeDetail()">×</button>
  <div id="dp-header">
    <div id="dc-num"></div>
    <div id="dc-title"></div>
  </div>
  <div id="dp-body">
    <div id="dp-left">
      <div id="dc-fields"></div>
      <div id="dc-desc"></div>
    </div>
    <div id="dp-divider"></div>
    <div id="dp-right">
      <div id="dc-cmt-list"></div>
      <div id="dc-cmt-input-area">
        <div id="dc-cmt-hint"></div>
        <div id="dc-cmt-row">
          <textarea id="dc-cmt-input" placeholder="댓글 남기기…" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitCmt();}
            this.style.height='auto';this.style.height=this.scrollHeight+'px';"></textarea>
          <button onclick="submitCmt()">→</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL OVERLAY (sharing idea only) -->
<div id="modal-overlay" class="modal-overlay" onclick="closeSharing()"></div>

<!-- SHARING IDEA MODAL -->
<div id="modal-sharing" class="center-modal">
  <button class="cm-close" onclick="closeSharing()">×</button>
  <div class="cm-header">
    <h2>sharing idea</h2>
    <p class="cm-desc">아직 완성되지 않은 아이디어를 공유해주세요</p>
  </div>
  <div class="cm-body">
    <div class="sf-row">
      <span class="sf-label">제목</span>
      <input class="sf-input-field" placeholder="프로젝트 이름"/>
    </div>
    <div class="sf-row">
      <span class="sf-label">분야</span>
      <input class="sf-input-field" placeholder="타이포그라피, 영상, 3D..."/>
    </div>
    <div class="sf-row">
      <span class="sf-label">연도</span>
      <input class="sf-input-field" placeholder="2025, 2026..."/>
    </div>
    <div class="sf-row">
      <span class="sf-label">협업</span>
      <input class="sf-input-field" placeholder="개인, 팀..."/>
    </div>
    <div class="sf-row">
      <span class="sf-label">맥락</span>
      <input class="sf-input-field" placeholder="수업 과제, 개인 프로젝트, 공모전..."/>
    </div>
    <div class="sf-row">
      <span class="sf-label">중단 단계</span>
      <input class="sf-input-field" placeholder="기획 중, 작업 중간에, 다 마치고..."/>
    </div>
    <div class="sf-row sf-row-top">
      <span class="sf-label">작업</span>
      <textarea class="sf-input-field sf-textarea" placeholder="사용한 툴, 작업 방식, 중단 이유, 감정 등 뭐든 적어주세요!"></textarea>
    </div>
  </div>
  <div class="cm-submit-row">
    <button class="cm-submit" onclick="showToast('준비 중입니다')">제출하기</button>
  </div>
</div>

<div id="toast"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRh6R6DSCq22aA6548mIGHk84h9oL2f83_x6GB60QoCzi5_RCGfNp_SYntKOcrRUJqmn4aJiWDipvJJ/pub?output=csv";

const PALETTE = [
  "#CA0D0D","#F15411","#FFAA00","#00FF33","#00862D",
  "#A8E5A6","#7AF1DF","#5289EF","#0004FF","#452C99",
  "#DDBEDA","#8F0C9E","#EDB4C3","#FE1CC5","#AC4C21",
];

let ENTRY_COLORS = [];
function assignColors(){
  ENTRY_COLORS = ALL.map(() =>
    PALETTE[Math.floor(Math.random() * PALETTE.length)]
  );
}

const FIELD_LABELS = {
  "Discipline":"분야","Year":"연도","Collaboration type":"협업",
  "Context":"맥락","Stage of abandonment":"중단 단계",
  "Reason for abandonment":"중단 이유","Tool used":"사용 툴","Emotion":"감정",
};
const FIELD_ORDER = ["Discipline","Year","Collaboration type","Context",
  "Stage of abandonment","Reason for abandonment","Tool used","Emotion"];

let ALL=[], activeEntry=null, activePage=null, activeSentId=null;
const SAVED=[];
const COMMENTS={};
const FOOTNOTE_ORDER={};
let myBoxMode=false;

/* ── DATE FORMAT ── */
function formatDate(date){
  const yy=String(date.getFullYear()).slice(2);
  const mm=String(date.getMonth()+1).padStart(2,'0');
  const dd=String(date.getDate()).padStart(2,'0');
  const h=date.getHours();
  const min=String(date.getMinutes()).padStart(2,'0');
  return `${yy}/${mm}/${dd} ${h}:${min}`;
}

/* ── CSV ── */
function parseCSV(raw){
  const text=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim();
  const rows=[]; let headers=null,i=0;
  function rf(){
    if(text[i]==='"'){i++;let v='';while(i<text.length){if(text[i]==='"'){if(text[i+1]==='"'){v+='"';i+=2;}else{i++;break;}}else v+=text[i++];}return v;}
    let v='';while(i<text.length&&text[i]!==','&&text[i]!=='\n')v+=text[i++];return v;
  }
  function rr(){const f=[];while(i<text.length){f.push(rf());if(text[i]===',')i++;else if(text[i]==='\n'){i++;break;}else break;}return f;}
  while(i<text.length){const f=rr();if(!headers)headers=f.map(h=>h.trim());else{const o={};headers.forEach((h,j)=>o[h]=(f[j]||'').trim());if(o["Project name"])rows.push(o);}}
  return rows;
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function stripImg(s){return(s||'').replace(/\[img:https?:\/\/[^\]]+\]/g,'').replace(/\[img:[^\]]*$/g,'').trim();}

/* ── SENTENCE HELPERS ── */
function splitSents(text){
  if(!text) return [];
  const parts=text.match(/[^.!?。！？\n]+[.!?。！？]?/g)||[text];
  return parts.map(s=>s.trim()).filter(s=>s.length>1);
}
function sentKey(entryIdx,sid){ return `${entryIdx}__${sid}`; }

function getFootnoteNum(entryIdx,sid){
  const order=FOOTNOTE_ORDER[entryIdx]||[];
  const idx=order.indexOf(sid);
  return idx>=0 ? idx+1 : 0;
}

/* N colored dot circles */
function buildDots(num, color){
  return Array(num).fill(
    `<span class="sent-dot" style="background:${color}"></span>`
  ).join('');
}

/* Sentence HTML — superscript dots (N = footnote number) */
function makeSentHtml(text, entryIdx, sid, color){
  const num=getFootnoteNum(entryIdx,sid);
  const sup=num>0
    ? `<sup class="sent-dots">${buildDots(num,color)}</sup>`
    : '';
  return `<span class="sent" data-entry="${entryIdx}" data-sid="${sid}"
    onclick="selectSent(this)"
  >${esc(text)}${sup}<button class="sent-save" onclick="event.stopPropagation();saveSent(${entryIdx},'${sid}')" title="my box에 저장">+</button></span>`;
}

/* ── PHYSICS ── */
let engine, runner, allBodies=[], domEls=[], hoveredIdx=-1, isDragging=false;

function initPhysics(){
  const W=window.innerWidth, H=window.innerHeight;
  const cvs=document.getElementById('physics-canvas');
  cvs.width=W; cvs.height=H;

  engine=Matter.Engine.create({gravity:{y:1.4}});
  const world=engine.world;
  Matter.World.add(world,[
    Matter.Bodies.rectangle(W/2,H+30,W*2,60,{isStatic:true}),
    Matter.Bodies.rectangle(-30,H/2,60,H*3,{isStatic:true}),
    Matter.Bodies.rectangle(W+30,H/2,60,H*3,{isStatic:true}),
  ]);

  const WS=[100,125,110,90,135,115,95,120,105,130];
  const HS=[72,85,78,68,80,88,74,82,76,84];
  const numCols=5, gutter=14, avgW=115;
  const totalW=numCols*(avgW+gutter);
  const startX=(W-totalW)/2+avgW/2;

  ALL.forEach((row,i)=>{
    const col=i%numCols, tier=Math.floor(i/numCols);
    const w=WS[i%WS.length], h=HS[i%HS.length];
    const x=startX+col*(avgW+gutter)+(Math.random()-0.5)*8;
    const y=-200-tier*120;
    const body=Matter.Bodies.rectangle(x,y,w,h,{
      restitution:0.08,friction:0.85,frictionAir:0.025,chamfer:{radius:11},
    });
    body.entryIndex=i;
    allBodies.push(body);
    Matter.World.add(world,body);

    const el=document.createElement('div');
    el.className='block';
    el.style.cssText=`width:${w}px;height:${h}px;`;
    document.getElementById('blocks-layer').appendChild(el);
    domEls.push({el,body,w,h});
  });

  const mouse=Matter.Mouse.create(cvs);
  const mc=Matter.MouseConstraint.create(engine,{mouse,constraint:{stiffness:0.18,render:{visible:false}}});
  Matter.World.add(world,mc);

  let downPos=null;
  cvs.addEventListener('mousedown',e=>{downPos={x:e.clientX,y:e.clientY};isDragging=false;});
  cvs.addEventListener('mousemove',e=>{
    if(downPos&&Math.hypot(e.clientX-downPos.x,e.clientY-downPos.y)>5)isDragging=true;
    handleHover(e);
  });
  cvs.addEventListener('mouseup',e=>{
    downPos=null;
    if(!isDragging)handleClick(e);
    setTimeout(()=>{isDragging=false;},50);
  });
  cvs.addEventListener('mouseleave',()=>{
    hideTooltip();
    if(hoveredIdx>=0){domEls[hoveredIdx].el.style.background='#111';hoveredIdx=-1;}
  });

  runner=Matter.Runner.create();
  Matter.Runner.run(runner,engine);
  (function loop(){
    domEls.forEach(({el,body,w,h})=>{
      const{x,y}=body.position,a=body.angle;
      el.style.transform=`translate(${x-w/2}px,${y-h/2}px) rotate(${a}rad)`;
    });
    requestAnimationFrame(loop);
  })();
}

function getBodyAt(x,y){const h=Matter.Query.point(allBodies,{x,y});return h.length?h[0]:null;}

function handleHover(e){
  if(myBoxMode) return;
  const r=document.getElementById('physics-canvas').getBoundingClientRect();
  const body=getBodyAt(e.clientX-r.left,e.clientY-r.top);
  if(body){
    const idx=body.entryIndex;
    if(idx!==hoveredIdx){
      if(hoveredIdx>=0)domEls[hoveredIdx].el.style.background='#111';
      domEls[idx].el.style.background=ENTRY_COLORS[idx];
      hoveredIdx=idx;
      showTooltip(idx,e);
    } else positionTooltip(e);
    document.getElementById('physics-canvas').style.cursor='grab';
  } else {
    if(hoveredIdx>=0){domEls[hoveredIdx].el.style.background='#111';hoveredIdx=-1;}
    hideTooltip();
    document.getElementById('physics-canvas').style.cursor='default';
  }
}
function handleClick(e){
  if(myBoxMode) return;
  const r=document.getElementById('physics-canvas').getBoundingClientRect();
  const body=getBodyAt(e.clientX-r.left,e.clientY-r.top);
  if(body)openDetail(body.entryIndex);
}

function showTooltip(i,e){
  const row=ALL[i];
  document.getElementById('tt-name').textContent=stripImg(row["Project name"]||'');
  document.getElementById('tt-meta').textContent=[row["Discipline"],row["Year"]].filter(Boolean).join(' · ');
  const tt=document.getElementById('tooltip');
  tt.style.display='block';
  positionTooltip(e);
}
function positionTooltip(e){
  const tt=document.getElementById('tooltip');
  tt.style.left=Math.min(e.clientX+16,window.innerWidth-210)+'px';
  tt.style.top=Math.max(e.clientY-8,8)+'px';
}
function hideTooltip(){document.getElementById('tooltip').style.display='none';}

/* ── DETAIL ── */
function openDetail(idx){
  // Close any open nav page first
  if(activePage==='sharing') closeSharing();
  if(activePage==='mybox') closeMyBox();

  activeEntry=idx; activeSentId=null;
  const row=ALL[idx];
  const color=ENTRY_COLORS[idx];
  hideTooltip();

  document.getElementById('landing').style.background=color;
  document.body.style.background=color;

  document.getElementById('dc-num').textContent=String(idx+1).padStart(2,'0');
  document.getElementById('dc-title').textContent=stripImg(row["Project name"]||'');

  document.getElementById('dc-fields').innerHTML=FIELD_ORDER.map(k=>{
    const v=row[k]||''; if(!v)return '';
    const sid=`f_${k.replace(/\s/g,'_')}`;
    return `<div class="dcf-row">
      <span class="dcf-label">${FIELD_LABELS[k]||k}</span>
      <span class="dcf-val">${makeSentHtml(v,idx,sid,color)}</span>
    </div>`;
  }).join('');

  const desc=stripImg(row["Description"]||'');
  const sents=splitSents(desc);
  document.getElementById('dc-desc').innerHTML=
    sents.map((s,si)=>makeSentHtml(s,idx,`d${si}`,color)).join(' ');

  renderCmtList(idx);
  document.getElementById('dc-cmt-hint').textContent='';
  document.getElementById('dc-cmt-input').value='';

  document.getElementById('detail-panel').classList.add('visible');
  document.getElementById('physics-canvas').style.pointerEvents='none';
}

function closeDetail(){
  document.getElementById('landing').style.background='#fff';
  document.body.style.background='#fff';
  document.getElementById('detail-panel').classList.remove('visible');
  document.getElementById('physics-canvas').style.pointerEvents='auto';
  activeEntry=null; activeSentId=null;
}

/* ── SENTENCE CLICK ── */
function selectSent(el){
  if(activeEntry===null)return;
  document.querySelectorAll('.sent.active-sent').forEach(s=>s.classList.remove('active-sent'));
  el.classList.add('active-sent');
  activeSentId=el.dataset.sid;
  const clone=el.cloneNode(true);
  clone.querySelectorAll('.sent-dots,.sent-save').forEach(e=>e.remove());
  const text=clone.innerText.trim();
  document.getElementById('dc-cmt-hint').textContent=`"${text.substring(0,40)}${text.length>40?'…':''}"`;
  document.getElementById('dc-cmt-input').focus();
}

function saveSent(entryIdx, sid){
  const el=document.querySelector(`.sent[data-entry="${entryIdx}"][data-sid="${sid}"]`);
  if(!el)return;
  const clone=el.cloneNode(true);
  clone.querySelectorAll('.sent-save,.sent-dots').forEach(e=>e.remove());
  const text=clone.innerText.trim();
  if(SAVED.find(s=>s.text===text)){showToast('이미 저장됨');return;}
  SAVED.unshift({text, date:formatDate(new Date()), entryIndex:entryIdx});
  if(myBoxMode){
    domEls[entryIdx].el.style.background=ENTRY_COLORS[entryIdx];
    renderMyBox();
  }
  showToast('my box에 저장됨 ✓');
}

function submitCmt(){
  if(activeEntry===null||!activeSentId)return;
  const inp=document.getElementById('dc-cmt-input');
  const val=inp.value.trim(); if(!val)return;
  const key=sentKey(activeEntry,activeSentId);
  const isFirst=!(COMMENTS[key]||[]).length;
  if(!COMMENTS[key])COMMENTS[key]=[];
  COMMENTS[key].push({text:val,sid:activeSentId,formattedDate:formatDate(new Date())});
  inp.value='';
  if(isFirst){
    if(!FOOTNOTE_ORDER[activeEntry])FOOTNOTE_ORDER[activeEntry]=[];
    if(!FOOTNOTE_ORDER[activeEntry].includes(activeSentId))
      FOOTNOTE_ORDER[activeEntry].push(activeSentId);
  }
  rerenderAnnotations(activeEntry);
  renderCmtList(activeEntry);
  showToast('댓글 저장됨');
}

function rerenderAnnotations(entryIdx){
  const color=ENTRY_COLORS[entryIdx];
  document.querySelectorAll(`.sent[data-entry="${entryIdx}"]`).forEach(el=>{
    const sid=el.dataset.sid;
    const num=getFootnoteNum(entryIdx,sid);
    let supEl=el.querySelector('.sent-dots');
    if(num>0){
      if(!supEl){
        supEl=document.createElement('sup');
        supEl.className='sent-dots';
        const btn=el.querySelector('.sent-save');
        el.insertBefore(supEl,btn||null);
      }
      supEl.innerHTML=buildDots(num,color);
    }
  });
}

/* Right panel: dots on top (horizontal), comment text below */
function renderCmtList(entryIdx){
  const color=ENTRY_COLORS[entryIdx];
  const allCmts=[];
  Object.keys(COMMENTS).forEach(key=>{
    if(key.startsWith(`${entryIdx}__`)){
      const sid=key.split('__')[1];
      (COMMENTS[key]||[]).forEach(c=>allCmts.push({...c,sid}));
    }
  });
  const el=document.getElementById('dc-cmt-list');
  if(!allCmts.length){
    el.innerHTML='<div class="dc-cmt-empty">문장을 클릭해 댓글을 달아보세요</div>';
    return;
  }
  el.innerHTML=allCmts.map(c=>{
    const num=getFootnoteNum(entryIdx,c.sid);
    const dotsHtml=num>0
      ? buildDots(num,color)
      : `<span class="sent-dot" style="background:${color}"></span>`;
    return `
<div class="dc-cmt" onclick="highlightSent('${entryIdx}','${c.sid}')">
  <div class="dc-dots-row">${dotsHtml}</div>
  <div class="dc-cmt-text">${esc(c.text)}</div>
  <div class="dc-cmt-meta">${c.formattedDate}</div>
</div>`;
  }).join('');
}

function highlightSent(entryIdx, sid){
  document.querySelectorAll('.sent.active-sent').forEach(s=>s.classList.remove('active-sent'));
  const el=document.querySelector(`.sent[data-entry="${entryIdx}"][data-sid="${sid}"]`);
  if(el){el.classList.add('active-sent');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

/* ── BLOCK COLORS ── */
function applyMyBoxBlockColors(){
  const savedSet=new Set(SAVED.map(s=>s.entryIndex));
  domEls.forEach(({el},i)=>{
    el.style.background=savedSet.has(i)?ENTRY_COLORS[i]:'#fff';
  });
}
function revertBlockColors(){
  domEls.forEach(({el})=>{el.style.background='#111';});
  hoveredIdx=-1;
}

/* ── MY BOX (full-screen background) ── */
function openMyBox(){
  // Close any open pages first
  if(activePage==='sharing') closeSharing();
  if(activeEntry!==null) closeDetail();

  renderMyBox();
  myBoxMode=true;
  document.getElementById('landing').style.background='#111';
  document.body.style.background='#111';
  applyMyBoxBlockColors();
  document.getElementById('nav').classList.add('nav-white');
  document.getElementById('mybox-page').classList.add('visible');
  activePage='mybox';
}
function closeMyBox(){
  document.getElementById('mybox-page').classList.remove('visible');
  document.getElementById('nav').classList.remove('nav-white');
  if(myBoxMode){
    myBoxMode=false;
    document.getElementById('landing').style.background='#fff';
    document.body.style.background='#fff';
    revertBlockColors();
  }
  activePage=null;
}

function renderMyBox(){
  const el=document.getElementById('mybox-items');
  if(!SAVED.length){
    el.innerHTML='<p class="mybox-empty">저장된 문장이 없습니다<br>문장 옆 + 버튼으로 저장해보세요</p>';
    return;
  }
  // Show date only (no source title)
  el.innerHTML=SAVED.map((s,i)=>`
<div class="mybox-item">
  <button class="mybox-del" onclick="delSaved(${i})">×</button>
  <div class="mybox-text">"${esc(s.text)}"</div>
  <div class="mybox-date">${s.date}</div>
</div>`).join('');
}
function delSaved(i){
  SAVED.splice(i,1);
  if(myBoxMode) applyMyBoxBlockColors();
  renderMyBox();
}

/* ── SHARING IDEA (center modal) ── */
function openSharing(){
  // Close any open pages first
  if(activePage==='mybox') closeMyBox();
  if(activeEntry!==null) closeDetail();

  document.getElementById('modal-sharing').classList.add('visible');
  document.getElementById('modal-overlay').classList.add('visible');
  activePage='sharing';
}
function closeSharing(){
  document.getElementById('modal-sharing').classList.remove('visible');
  document.getElementById('modal-overlay').classList.remove('visible');
  activePage=null;
}

function closeAllModals(){
  closeSharing();
  closeMyBox();
  closeDetail();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(activePage==='mybox') closeMyBox();
    else if(activePage==='sharing') closeSharing();
    else if(activeEntry!==null) closeDetail();
  }
});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

/* ── FETCH ── */
fetch(CSV_URL)
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.text();})
  .then(txt=>{
    ALL=parseCSV(txt);
    assignColors();
    initPhysics();
  })
  .catch(err=>{
    document.getElementById('landing').innerHTML='<div style="padding:4rem;color:#aaa;font-size:14px">데이터를 불러오지 못했습니다</div>';
    console.error(err);
  });
</script>
</body>
</html>
